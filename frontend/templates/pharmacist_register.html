<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pharmacist Login | AEGISMEDLABS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../static/css/style.css">
</head>
<body>

<div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>

<nav class="menu-panel" id="menu">
  <a href="home.html">🏠 Home</a>
  <a href="doctor_login.html">👨‍⚕ Doctor Login</a>
  <a href="pharmacist_login.html">💊 Pharmacist Login</a>
  <a href="admin_login.html">🛡 Admin Login</a>
  <a href="doctor.html">📝 Prescription Panel</a>
  <a href="verify.html">✅ Verify QR</a>
</nav>

<header class="navbar-custom">
  <div class="menu-icon" onclick="toggleMenu()"><div></div><div></div><div></div></div>
  <a href="home.html" class="brand">AEGISMEDLABS</a>
  <div style="width:38px"></div>
</header>

<div class="login-wrapper">
  <div class="login-sheet">

    <div class="page-header">
      <div class="page-chip" style="background:rgba(122,92,255,0.15);border-color:rgba(122,92,255,0.35);color:#c4b5ff;">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
          <path d="M9.5 2.5A4.5 4.5 0 0 1 14 7a4.5 4.5 0 0 1-4.5 4.5L6.5 8 9.5 2.5z" stroke="currentColor" stroke-width="1.3"/>
          <path d="M6.5 2.5A4.5 4.5 0 0 0 2 7a4.5 4.5 0 0 0 4.5 4.5L9.5 8 6.5 2.5z" stroke="currentColor" stroke-width="1.3"/>
        </svg>
        Pharmacy Terminal
      </div>
      <div class="page-title">Pharmacist Login</div>
      <div class="page-subtitle">Access the prescription dispensing panel</div>
    </div>

    <form id="pharmacistLoginForm">

      <div class="mb-4">
        <label class="form-label">Pharmacist ID</label>
        <input type="text" class="form-control" id="pharmacist_id" placeholder="e.g. PH-MH-00456" required>
      </div>

      <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
      </div>

      <button type="submit" class="btn-luxury" id="loginBtn"
        style="background:linear-gradient(135deg,#7a5cff,#ff4ecd);">
        💊 Access Pharmacy Panel
      </button>

    </form>

    <div style="margin-top:24px;padding:16px;background:rgba(122,92,255,0.08);border:1px solid rgba(122,92,255,0.2);border-radius:12px;text-align:center;">
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:10px;">Want to verify a prescription directly?</p>
      <a href="verify.html" class="btn-secondary" style="text-decoration:none;">✅ Go to Verify QR</a>
    </div>

    <p style="text-align:center;font-size:11px;color:var(--text-muted);margin-top:20px;letter-spacing:0.06em;">
      🔒 Secure dispensing · Prescription validation enabled
    </p>

  </div>
</div>

<div class="toast-notif" id="toast"><span id="toastMsg"></span></div>

<script>
function toggleMenu() {
  document.getElementById('menu').classList.toggle('open');
  document.getElementById('menuOverlay').classList.toggle('show');
}

function showToast(msg, dur=3000) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), dur);
}

document.getElementById('pharmacistLoginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  btn.innerHTML = '<span class="spinner"></span> Verifying...';
  btn.disabled = true;

  try {
    const res = await fetch('http://127.0.0.1:8000/pharmacists/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        pharmacist_id: document.getElementById('pharmacist_id').value,
        password: document.getElementById('password').value
      })
    });
    const data = await res.json();
    if (res.ok) {
      showToast('✅ Login successful! Redirecting...');
      setTimeout(() => window.location.href = 'verify.html', 1000);
    } else {
      showToast('❌ ' + (data.detail || 'Login failed'));
      btn.innerHTML = '💊 Access Pharmacy Panel';
      btn.disabled = false;
    }
  } catch(err) {
    showToast('⚡ Demo mode — redirecting to verify panel');
    setTimeout(() => window.location.href = 'verify.html', 1000);
  }
});
</script>
</body>
</html>
