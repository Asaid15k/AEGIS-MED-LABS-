<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard | AEGISMEDLABS</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Global CSS -->
    <link rel="stylesheet" href="../static/css/style.css" />

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #f4f6f9;
        }

        .dashboard-wrapper {
            padding: 40px 20px;
            max-width: 1200px;
            margin: auto;
        }

        .dashboard-title {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 30px;
            text-align: center;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .stat-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.12);
        }

        .stat-card h3 {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .value {
            font-size: 36px;
            font-weight: 700;
            color: #0d6efd;
        }

        /* MENU PANEL (Same as other pages for consistency) */
        .menu-panel {
            position: fixed;
            top: 0;
            left: -260px;
            width: 260px;
            height: 100vh;
            background: #111827;
            padding: 20px;
            transition: left 0.3s ease;
            z-index: 1000;
        }

        .menu-panel.open {
            left: 0;
        }

        .menu-panel a {
            display: block;
            color: #ffffff;
            text-decoration: none;
            padding: 12px 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .menu-panel a:hover {
            background: #1f2937;
        }

        /* NAVBAR */
        .navbar-custom {
            background: #ffffff;
            padding: 12px 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 999;
        }

        .brand {
            font-size: 20px;
            font-weight: 700;
            text-decoration: none;
            color: #111827;
        }

        .menu-icon {
            cursor: pointer;
        }

        .menu-icon div {
            width: 25px;
            height: 3px;
            background: #111827;
            margin: 5px 0;
            border-radius: 2px;
        }
    </style>
</head>

<body>

    <!-- FULL HAMBURGER MENU (All Pages Added) -->
    <nav class="menu-panel" id="menu">
        <a href="home.html">🏠 Home</a>
        <a href="doctor.html">👨‍⚕ Doctor Panel</a>
        <a href="verify.html">✅ Verify QR</a>
        <a href="doctor_login.html">🔐 Doctor Login</a>
        <a href="pharmacist_login.html">💊 Pharmacist Login</a>
        <a href="admin_dashboard.html">🛡 Admin Dashboard</a>
    </nav>

    <!-- NAVBAR -->
    <header class="navbar-custom d-flex justify-content-between align-items-center">
        
        <!-- Hamburger -->
        <div class="menu-icon" onclick="toggleMenu()" aria-label="Toggle Menu">
            <div></div>
            <div></div>
            <div></div>
        </div>

        <!-- BRAND NOW REDIRECTS TO HOME PAGE -->
        <a href="home.html" class="brand">AEGISMEDLABS</a>
    </header>

    <!-- MAIN DASHBOARD CONTENT -->
    <main class="dashboard-wrapper">
        <h1 class="dashboard-title">🛡 ADMIN DASHBOARD</h1>

        <section class="stat-grid">

            <!-- Total Prescriptions -->
            <div class="stat-card">
                <h3>📄 Total Prescriptions</h3>
                <div class="value" id="rxCount">0</div>
            </div>

            <!-- Total Verifications -->
            <div class="stat-card">
                <h3>✅ Total Verifications</h3>
                <div class="value" id="verifyCount">0</div>
            </div>

            <!-- Fraud Attempts -->
            <div class="stat-card">
                <h3>🚨 Fraud Attempts Detected</h3>
                <div class="value" id="fraudCount">0</div>
            </div>

        </section>
    </main>

    <script>
        // Toggle Hamburger Menu
        function toggleMenu() {
            document.getElementById("menu").classList.toggle("open");
        }

        // Load demo stats (independent of login)
        document.addEventListener("DOMContentLoaded", function () {
            const rxCount = parseInt(localStorage.getItem("rxCount")) || 0;
            const verifyCount = parseInt(localStorage.getItem("verifyCount")) || 0;
            const fraudCount = parseInt(localStorage.getItem("fraudCount")) || 0;

            document.getElementById("rxCount").textContent = rxCount;
            document.getElementById("verifyCount").textContent = verifyCount;
            document.getElementById("fraudCount").textContent = fraudCount;
        });
    </script>

</body>
</html>
