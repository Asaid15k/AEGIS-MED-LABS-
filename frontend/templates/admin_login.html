<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | AEGISMEDLABS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../static/css/style.css">
</head>
<body>

<div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>

<nav class="menu-panel" id="menu">
  <a href="home.html">🏠 Home</a>
  <a href="doctor_login.html">👨‍⚕ Doctor Login</a>
  <a href="pharmacist_login.html">💊 Pharmacist Login</a>
  <a href="admin_login.html">🛡 Admin Login</a>
  <a href="doctor.html">📝 Prescription Panel</a>
  <a href="verify.html">✅ Verify QR</a>
</nav>

<header class="navbar-custom">
  <div class="menu-icon" onclick="toggleMenu()"><div></div><div></div><div></div></div>
  <a href="home.html" class="brand">AEGISMEDLABS</a>
  <div style="width:38px"></div>
</header>

<div class="login-wrapper">
  <div class="login-sheet">

    <div class="page-header">
      <div class="page-chip" style="background:rgba(255,94,122,0.12);border-color:rgba(255,94,122,0.3);color:#ffb3c1;">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
          <path d="M8 1l5 3v4c0 3-2.5 5.5-5 6.5C5.5 13.5 3 11 3 8V4l5-3z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
        </svg>
        Secure Admin Access
      </div>
      <div class="page-title">Admin Login</div>
      <div class="page-subtitle">Multi-factor secured administrator portal</div>
    </div>

    <form id="adminLoginForm">

      <div class="mb-4">
        <label class="form-label">Admin ID</label>
        <input type="text" class="form-control" id="admin_id" placeholder="e.g. AEGIS-ADMIN-001" required>
      </div>

      <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" id="password" placeholder="Enter secure password" required>
      </div>

      <div class="mb-4">
        <label class="form-label">2FA OTP</label>
        <input type="text" class="form-control" id="otp" placeholder="6-digit OTP from authenticator" maxlength="6" required>
      </div>

      <button type="submit" class="btn-luxury" id="loginBtn"
        style="background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid rgba(255,94,122,0.35);">
        🔐 Login Securely
      </button>

    </form>

    <div style="margin-top:20px;padding:14px 16px;background:rgba(255,94,122,0.06);border:1px solid rgba(255,94,122,0.18);border-radius:12px;">
      <p style="font-size:11px;color:rgba(255,180,180,0.7);text-align:center;letter-spacing:0.06em;margin:0;">
        ⚠️ Unauthorized access attempts are logged and reported
      </p>
    </div>

  </div>
</div>

<div class="toast-notif" id="toast"><span id="toastMsg"></span></div>

<script>
function toggleMenu() {
  document.getElementById('menu').classList.toggle('open');
  document.getElementById('menuOverlay').classList.toggle('show');
}

function showToast(msg, dur=3000) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), dur);
}

document.getElementById('adminLoginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  btn.innerHTML = '<span class="spinner"></span> Authenticating...';
  btn.disabled = true;

  try {
    const res = await fetch('https://aegis-med-labs-production.up.railway.app/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        admin_id: document.getElementById('admin_id').value,
        password: document.getElementById('password').value,
        otp: document.getElementById('otp').value
      })
    });
    const data = await res.json();
    if (res.ok) {
      showToast('✅ Access granted! Redirecting...');
      setTimeout(() => window.location.href = 'admin_dashboard.html', 1000);
    } else {
      showToast('❌ ' + (data.detail || 'Access denied'));
      btn.innerHTML = '🔐 Login Securely';
      btn.disabled = false;
    }
  } catch(err) {
    showToast('⚡ Demo mode — redirecting to dashboard');
    setTimeout(() => window.location.href = 'admin_dashboard.html', 1000);
  }
});
</script>
</body>
</html>
