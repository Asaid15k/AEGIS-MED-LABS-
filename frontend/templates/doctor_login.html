<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctor Login | AEGISMEDLABS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../static/css/style.css">
</head>
<body>

<div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>

<nav class="menu-panel" id="menu">
  <a href="/home">🏠 Home</a>
  <a href="/doctor">👨‍⚕ Doctor Login</a>
  <a href="/pharmacist">💊 Pharmacist Login</a>
  <a href="/admin">🛡 Admin Login</a>
  <a href="/doctor-panel">📝 Prescription Panel</a>
  <a href="/verify">✅ Verify QR</a>
</nav>

<header class="navbar-custom">
  <div class="menu-icon" onclick="toggleMenu()"><div></div><div></div><div></div></div>
  <a href="/home" class="brand">AEGISMEDLABS</a>
  <div style="width:38px"></div>
</header>

<div class="login-wrapper">
  <div class="login-sheet">

    <div class="page-header">
      <div class="page-chip">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
          <path d="M8 1a4 4 0 1 1 0 8A4 4 0 0 1 8 1zM2 14c0-3 2.7-5 6-5s6 2 6 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        Doctor Terminal
      </div>
      <div class="page-title">Doctor Login</div>
      <div class="page-subtitle">Access your prescription panel securely</div>
    </div>

    <form id="doctorLoginForm">
      <div class="mb-4">
        <label class="form-label">Medical ID / License Number</label>
        <input type="text" class="form-control" id="medical_id" placeholder="e.g. MH-DOC-00123" required>
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
      </div>

      <button type="submit" class="btn-luxury" id="loginBtn">
        🔐 Login to Doctor Panel
      </button>
    </form>

    <div style="text-align:center;margin-top:22px;">
      <p style="font-size:13px;color:var(--text-muted);margin-bottom:12px;">New to AEGISMEDLABS?</p>
      <a href="/doctor-register" class="btn-secondary" style="text-decoration:none;">📝 Register as Doctor</a>
    </div>

    <p style="text-align:center;font-size:11px;color:var(--text-muted);margin-top:22px;letter-spacing:0.06em;">
      🔒 Secured by blockchain · End-to-end encrypted
    </p>

  </div>
</div>

<div class="toast-notif" id="toast"><span id="toastMsg"></span></div>

<script>
function toggleMenu() {
  document.getElementById('menu').classList.toggle('open');
  document.getElementById('menuOverlay').classList.toggle('show');
}

function showToast(msg, dur=3000) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), dur);
}

document.getElementById('doctorLoginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  btn.innerHTML = '<span class="spinner"></span> Verifying...';
  btn.disabled = true;

  try {
    const res = await fetch('https://aegis-med-labs-production.up.railway.app/doctors/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        license_number: document.getElementById('medical_id').value,
        password: document.getElementById('password').value
      })
    });
    const data = await res.json();
    if (res.ok) {
      showToast('✅ Login successful! Redirecting...');
      setTimeout(() => window.location.href = 'doctor.html', 1000);
    } else {
      showToast('❌ ' + (data.detail || 'Login failed'));
      btn.innerHTML = '🔐 Login to Doctor Panel';
      btn.disabled = false;
    }
  } catch(err) {
    // Demo fallback
    showToast('⚡ Demo mode — redirecting to panel');
    setTimeout(() => window.location.href = 'doctor.html', 1000);
  }
});
</script>
</body>
</html>
