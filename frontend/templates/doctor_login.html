<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctor Login | AEGISMEDLABS</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../static/css/style.css">
</head>

<body>

<!-- HAMBURGER MENU -->
<div class="menu-panel" id="menu">
    <a href="home.html">🏠 Home</a>
    <a href="doctor.html">👨‍⚕ Doctor Panel</a>
    <a href="verify.html">✅ Verify QR</a>
    <a href="doctor_login.html">🔐 Doctor Login</a>
    <a href="pharmacist_login.html">💊 Pharmacist Login</a>
    <a href="admin_dashboard.html">🛡 Admin Dashboard</a>
</div>

<!-- NAVBAR -->
<div class="navbar-custom d-flex justify-content-between align-items-center">

    <!-- Hamburger Icon -->
    <div class="menu-icon" onclick="toggleMenu()">
        <div></div>
        <div></div>
        <div></div>
    </div>

    <!-- Brand Redirect -->
    <a href="home.html" class="brand">AEGISMEDLABS</a>
</div>

<!-- LOGIN WRAPPER -->
<div class="login-wrapper">
    <div class="login-sheet">

        <h2>👨‍⚕ DOCTOR LOGIN</h2>

        <form action="doctor.html" method="get">

            <label class="login-label">Medical ID</label>
            <input type="text" class="form-control login-input" placeholder="Enter Medical ID" required>

            <label class="login-label">Password</label>
            <input type="password" class="form-control login-input" placeholder="Enter Password" required>

            <!-- LOGIN BUTTON -->
            <button type="submit" class="login-btn">
                🔐 Login
            </button>

        </form>

        <!-- REGISTER REDIRECT BUTTON -->
        <div class="text-center mt-3">
            <p>New Doctor?</p>
            <button onclick="location.href='doctor_register.html'" class="login-btn">
                📝 Register Here
            </button>
        </div>

    </div>
</div>

<script>
function toggleMenu() {
    document.getElementById("menu").classList.toggle("open");
}
</script>

</body>
</html>
